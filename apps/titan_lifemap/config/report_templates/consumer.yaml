# Titan LifeMap - Consumer Report Template
#
# The report a client receives after completing their discovery session.
# Direct, personal, insight-led. Never contains hard financial data in raw form.
# The Core Transition is the centrepiece — everything else hangs off it.
#
# Structured to the Titan LifeMap Report Standard (seven beats): the report should make
# the reader feel deeply understood, reveal what they could not see, increase clarity,
# restore hope, increase self-trust, and end on one next step and who they are becoming.
# NOTE: sections `opening` and `becoming` are rendered specially by base_report.html
# (opening above the Core Transition banner; becoming as the final note) and are skipped
# in the main section loop. `whats_possible` renders in the loop in the position below.

report_title: "Your Titan LifeMap"
subtitle: "A personal clarity report from Sustain Momentum"

sections:
  - id: opening
    title: "Where You Are Right Now"
    instruction: |
      Beat 1 — open the whole report by making them feel met, before any analysis. In 2-4
      sentences, reflect back — in their own words and the things they care about — the
      situation they are standing in and what they came here hoping to resolve. Do NOT open by
      cataloguing what they have built or achieved — that edges into praise and holds them at
      arm's length; open instead on the human question they actually arrived with. No diagnosis
      yet, no praise, no thanking them for sharing. They should feel received before they feel
      analysed. This is the first thing they read, above the Core Transition.

  - id: core_transition
    title: "The Shift You're Making"
    source_field: core_transition
    instruction: |
      Their Core Transition phrase is shown directly above this section as the
      centrepiece of the report — do not repeat it more than once. In 2-3 sentences,
      name the shift they are actually moving through: what is ending, what is
      beginning, and the tension that sits between the two. This is the single most
      important paragraph in the report. Make it land with precision, not reassurance.

  - id: welcome
    title: "Where This Came From"
    instruction: |
      One short paragraph. Orient the reader: this report is built entirely from what
      they said in their session, and its purpose is to show them a pattern they may
      not have seen in themselves. No praise, no thanking them for sharing, no
      "this takes courage." Set the tone in two or three plain sentences and move on.

  - id: friction_diagnosis
    title: "What's Holding You Back"
    source_field: friction_diagnosis
    instruction: |
      The structured diagnosis — the one-line answer plus your primary and secondary
      frictions, each with what it is, how it shows up, and what it costs — is displayed
      directly in this section. Write only a 1-2 sentence lead-in framing why naming the
      friction plainly matters more than another theme. Do NOT restate the named frictions
      or their costs — they are shown below your text. Set it up, then let the diagnosis land.

  - id: future_vision
    title: "Where You're Heading"
    source_field: future_vision_statement
    instruction: |
      Go one step further than they did: name what their vision reveals about what they
      are really optimising for. At most one short paragraph (4-5 sentences). Insight, not
      reflection; evidence-based, no invented specifics.

  - id: personal_enough
    title: "What Enough Looks Like"
    source_field: personal_enough_statement
    instruction: |
      Describe the feeling they defined as "enough" — not a number. Then surface the gap
      between that and what they are still driving toward, and what that gap is costing
      them. This is often the sharpest section in the report. One short paragraph (4-5 sentences).

  - id: values
    title: "What Matters Most to You"
    source_field: top_five_values
    instruction: |
      Do not list their values back to them — they already know them. Instead, find the
      pattern: which value is actually driving the others, where two of them pull against
      each other, and what that tension explains about the decisions they find hard.
      One tight narrative of 4-5 sentences, not a values catalogue.

  - id: legacy
    title: "The Legacy You're Building"
    source_field: legacy_statement
    instruction: |
      Connect their Legacy Statement to the Core Transition and their values. Name what
      kind of life this legacy quietly requires of them now — the choices it implies
      before any money question enters the room. One short paragraph (4-5 sentences).

  - id: hwh_scorecard
    title: "Health, Wealth and Happiness"
    source_field: health_wealth_happiness_scorecard
    instruction: |
      Do not give three separate observations. Deliver ONE central insight: name which
      pillar is strongest, which is weakest, and — the real point — which pillar is
      constraining the other two. One tight diagnostic paragraph, 4-5 sentences maximum.
      Evidence-based, no invented specifics. Direct, not softened with praise.

  - id: clarity_score
    title: "Your Titan Clarity Score"
    source_field: clarity_components
    instruction: |
      The five components (Vision, Values, Execution, Health Alignment, Legacy Clarity)
      and the overall Titan Clarity Score are displayed directly in this section as figures
      — DO NOT state any of the numbers in your prose, and do not invent or round them. In
      one short paragraph, interpret the SHAPE of the scores: which dimension is carrying
      them and which is dragging the total down, and what that pattern means. Make it
      traceable — they should understand why the total is what it is. A starting point,
      not a grade.

  - id: biggest_insight
    title: "The Biggest Insight"
    source_field: biggest_insight
    instruction: |
      The insight itself is displayed directly in this section. Write at most ONE short
      sentence of lead-in — do not restate or expand it. This is the one thing they should
      remember in six months; let it stand on its own.

  - id: whats_possible
    title: "It's Genuinely Possible"
    instruction: |
      Beat 5 — restore hope and build trust in their OWN judgement, strictly from the evidence
      in their own answers. Point ONLY to specific things they actually said or did in this
      session (e.g. the 'enough' they defined, the value they prioritised, a decision they have
      already made well), phrased as plain observation — not as affirmation of the person. Do
      NOT use ungrounded or comparative praise: no "you've done harder things before", no "most
      people can't do this", no "that's not a small thing". If it is not concretely evidenced in
      their answers, cut it. They should leave trusting their own judgement more because you
      showed them their own evidence — not because you praised them. One short paragraph.

  - id: the_one_decision
    title: "The One Decision That Matters Most"
    source_field: the_one_decision
    instruction: |
      The decision itself is displayed directly in this section. Write at most ONE short
      sentence of lead-in — do not restate or expand the decision. This is the single change
      with the most leverage; let it stand on its own.

  - id: momentum_plan
    title: "If You Want to Go Further"
    source_field: momentum_plan
    instruction: |
      The five actions are listed in full directly below this text — DO NOT repeat, number,
      or restate them. These are OPTIONAL ways to keep going once the one decision above is
      made; frame them exactly that way. Write only a 1-2 sentence introduction positioning
      them as a supporting sequence that follows the one decision — not the headline. The one
      decision is the priority; this is the path that follows it.

  - id: becoming
    title: "Who You're Becoming"
    instruction: |
      Beat 7 — close the report on identity, looking forward. In 2-3 sentences, name —
      without grandeur or praise — the person their choices are beginning to make them into,
      framed as already underway, not a distant goal. This is rendered as the final note of
      the report. Leave them with a quiet sense that the change is possible and theirs.

  - id: next_steps
    title: "Ways Forward"
    instruction: |
      A brief, calm footer — 2-3 sentences at most. Awareness only matters if something
      changes; lightly note the three ways forward (sitting with the report themselves,
      working with a coach, or an introduction to a financial adviser) as options, never
      pressure. Do NOT try to close the report here — it has already closed on who they are
      becoming. This is only a quiet, practical note.
